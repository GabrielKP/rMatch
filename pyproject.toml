[tool.poetry]
name = "recall-matrix"
version = "0.1.0"
description = ""
authors = ["Gabriel Kressin Palacios <gkressi1@jhu.edu>"]
license = "MIT"
readme = "README.md"

[tool.poetry.dependencies]
python = ">=3.12,<3.15"
ruff = "^0.14.0"
pandas = "^2.3.3"
numpy = "^2.3.3"
pre-commit = "^4.3.0"
openpyxl = "^3.1.5"
matplotlib = "^3.10.7"
tqdm = "^4.67.1"
transformers = "<4.57.0"
python-dotenv = "^1.1.1"
rich = "^14.2.0"
accelerate = "^1.10.1"


[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"


[tool.ruff]
line-length = 88

[tool.ruff.lint]
extend-select = ["I", "E501"]
ignore = ["F401"]
